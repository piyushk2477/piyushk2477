# Save as: .github/workflows/profile-3d.yml  (in your piyushk2477/piyushk2477 repo)
# Regenerates the 3D contribution skyline every night and commits the SVG.
name: generate 3d contribution graph

on:
  schedule:
    - cron: "0 18 * * *" # every day ~midnight IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: generate 3d graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git diff --cached --quiet || git commit -m "chore: update 3d contribution graph"
          git push
